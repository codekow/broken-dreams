# REQUIRED on Istio >= 1.28 (OSSM 3.x): a gateway loading a TLS cert by
# credentialName uses SDS, and istiod authorizes the read with a
# SubjectAccessReview against the gateway pod's ServiceAccount. Without this
# Role/RoleBinding the gateway gets "not authorized to read secrets", the :8443
# listener has no cert, and every request fails (TLS EOF on passthrough, 503 on
# reencrypt).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-secret-reader
  namespace: tls-e2e-demo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-secret-reader
  namespace: tls-e2e-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-secret-reader
subjects:
  - kind: ServiceAccount
    name: istio-ingressgateway
    namespace: tls-e2e-demo
